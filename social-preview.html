<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>creature – animated poster</title>
    <style>
      @font-face {
        font-family: "Inter";
        src: url("/fonts/inter-light.otf?v=1") format("opentype");
        font-weight: 300;
        font-style: normal;
        font-display: swap;
      }

      :root {
        color-scheme: dark;
        background: #000;
        font-family: "Inter", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      canvas {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        position: relative;
        min-width: 320px;
        min-height: 180px;
        overflow: hidden;
        background: #000;
      }

      canvas {
        display: block;
      }

      h1 {
        position: absolute;
        z-index: 2;
        top: 50%;
        left: 50%;
        margin: 0;
        transform: translate(-50%, -50%);
        color: #fff;
        font-size: clamp(44px, 7.17vw, 86px);
        font-weight: 320;
        line-height: 1;
        letter-spacing: 0.16em;
        text-shadow:
          0 0 24px #000,
          0 0 8px #000;
      }
    </style>
  </head>
  <body>
    <canvas id="preview-canvas" aria-hidden="true"></canvas>
    <h1>creature</h1>

    <script type="module">
      import { CreatureRenderer } from '/src/renderer.ts';
      import { createSchool, setCreaturePalette, stepSchool } from '/src/school.ts';

      const canvas = document.querySelector('#preview-canvas');
      const creatures = createSchool(3, 0xc0ffee);
      const poses = [
        { x: 0.5, y: 0.51, size: 0.48, opacity: 1 },
        { x: 0.14, y: 0.21, size: 0.13, opacity: 0.64 },
        { x: 0.85, y: 0.78, size: 0.14, opacity: 0.62 },
      ];

      setCreaturePalette(creatures, 0, '#ffffff', '#ff2118');
      setCreaturePalette(creatures, 1, '#2a89b8', '#19ddff');
      setCreaturePalette(creatures, 2, '#8c42ad', '#e75cff');

      creatures.forEach((creature, index) => {
        const [red, green, blue] = creature.baseColor;
        creature.baseColor = [red, green, blue, index === 0 ? 0.96 : 0.9];
        creature.pulseWidth = index === 0 ? 0.14 : 0.12;
      });

      creatures.forEach((creature, index) => {
        const pose = poses[index];
        creature.x = pose.x;
        creature.y = pose.y;
        creature.size = pose.size;
        creature.centerX = pose.x;
        creature.centerY = pose.y;
        creature.radiusX = index === 0 ? 0.014 : 0.022;
        creature.radiusY = index === 0 ? 0.012 : 0.018;
        creature.opacity = pose.opacity;
        creature.targetCenterX = pose.x;
        creature.targetCenterY = pose.y;
        creature.targetSize = pose.size;
        creature.targetRadiusX = creature.radiusX;
        creature.targetRadiusY = creature.radiusY;
        creature.targetOpacity = pose.opacity;
      });

      const renderer = new CreatureRenderer(canvas, {
        pointDensity: 1,
        maxDevicePixelRatio: 2,
        onStateChange(state) {
          if (state === 'ready') document.body.dataset.ready = 'true';
        },
      });

      let elapsedSeconds = 3.8;
      let previousFrame = performance.now();
      function frame(now) {
        const deltaSeconds = Math.max(0, Math.min((now - previousFrame) / 1000, 0.05));
        previousFrame = now;
        elapsedSeconds += deltaSeconds;
        stepSchool(creatures, deltaSeconds, false);
        renderer.render(creatures, elapsedSeconds);
        requestAnimationFrame(frame);
      }

      requestAnimationFrame(frame);
    </script>
  </body>
</html>
